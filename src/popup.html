<!doctype html>
<html>
  <head>
    <title>ThreadForge</title>
    <style>
      body {
        width: 250px;
        font-family: sans-serif;
        padding: 10px;
        background-color: #f0f2f5;
      }
      h1 {
        font-size: 16px;
        color: #1c1e21;
        margin-bottom: 15px;
        text-align: center;
      }
      button {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        background-color: #0095f6;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }
      button:hover {
        background-color: #0081d7;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      #status {
        margin-top: 10px;
        text-align: center;
        font-size: 12px;
        color: #65676b;
        min-height: 15px; /* Reserve space */
      }
      progress {
        width: 100%;
        height: 8px;
        margin-top: 10px;
        display: none; /* Hidden by default */
      }
      /* Style the progress bar appearance */
      progress::-webkit-progress-bar {
        background-color: #e0e0e0;
        border-radius: 4px;
      }
      progress::-webkit-progress-value {
        background-color: #0095f6;
        border-radius: 4px;
        transition: width 0.1s ease;
      }
      progress::-moz-progress-bar {
        /* Firefox */
        background-color: #0095f6;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>ThreadForge</h1>
    <button id="showCommentsBtn">Show Comments Panel</button>
    <progress id="progressBar"></progress>
    <div id="status"></div>
    <script src="../popup.js"></script>
  </body>
</html>
